<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Monitor Sample</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="background-orb orb-a"></div>
  <div class="background-orb orb-b"></div>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Static JSON Monitor</p>
        <h1>다중 플랜 실행 모니터</h1>
        <p class="hero-text" id="meta-summary">
          샘플 데이터를 불러오는 중입니다.
        </p>
      </div>
      <div class="hero-controls">
        <div class="control-card">
          <p class="control-label">데이터 경로</p>
          <code id="data-path"></code>
        </div>
        <div class="control-row">
          <button id="refresh-button" type="button">지금 새로고침</button>
          <label class="toggle">
            <input id="auto-refresh-toggle" type="checkbox" checked>
            <span>자동 폴링</span>
          </label>
        </div>
        <div class="control-meta">
          <span id="refresh-status">폴링 대기중</span>
          <span id="last-refresh">최근 읽기 없음</span>
        </div>
      </div>
    </header>

    <main class="dashboard">
      <section class="panel panel-wide">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Summary</p>
            <h2>운영 스냅샷</h2>
          </div>
          <p class="panel-note" id="generated-at">-</p>
        </div>
        <div class="stats-grid" id="stats-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Signals</p>
            <h2>주요 알림</h2>
          </div>
        </div>
        <div class="signal-list" id="signal-list"></div>
      </section>

      <section class="panel panel-wide">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Board</p>
            <h2>작업 진행 현황</h2>
          </div>
          <p class="panel-note">상태별 경과 시간은 브라우저에서 실시간 계산합니다.</p>
        </div>
        <div class="table-shell">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>작업</th>
                <th>담당</th>
                <th>선행 조건</th>
                <th>상태</th>
                <th>진행도</th>
                <th>경과</th>
                <th>마지막 갱신</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="board-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Locks</p>
            <h2>공용 리소스 점유</h2>
          </div>
        </div>
        <div class="lock-list" id="lock-list"></div>
      </section>

      <section class="panel panel-full">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Timeline</p>
            <h2>최근 이벤트</h2>
          </div>
          <p class="panel-note">최신 이벤트가 위로 오도록 정렬합니다.</p>
        </div>
        <div class="timeline-list" id="timeline-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
